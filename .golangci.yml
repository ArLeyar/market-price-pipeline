version: "2"

run:
  timeout: 5m
  build-tags:
    - integration
    - e2e

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - errorlint
    - copyloopvar
    - nilerr
    - rowserrcheck
    - sqlclosecheck
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - encoding/json.Encoder.Encode
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/arleyar/market-price-pipeline
