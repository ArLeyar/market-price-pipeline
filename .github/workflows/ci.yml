name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1
          args: --timeout=5m

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet (default)
        run: go vet ./...
      - name: Vet (integration tag)
        run: go vet -tags=integration ./tests/...
      - name: Vet (e2e tag)
        run: go vet -tags=e2e ./tests/...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race -count=1 ./internal/... ./cmd/...

  integration:
    name: Integration tests (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run integration tests
        run: go test -tags=integration -timeout=600s -count=1 ./tests/...
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
