name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12
          args: --timeout=5m

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet (default)
        run: go vet ./...
      - name: Vet (integration tag)
        run: go vet -tags=integration ./tests/...
      - name: Vet (e2e tag)
        run: go vet -tags=e2e ./tests/...
      - name: Build
        run: go build ./...
      - name: Test with coverage
        run: |
          go test -race -count=1 \
            -coverprofile=coverage.out -covermode=atomic \
            ./internal/... ./cmd/...

      - name: Build coverage summary
        id: cov
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          {
            echo "## Unit test coverage — ${total}"
            echo
            echo '<details><summary>Per-file breakdown</summary>'
            echo
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
            echo
            echo '</details>'
          } > /tmp/cov.md
          {
            echo "total=${total}"
            {
              echo 'body<<EOF'
              cat /tmp/cov.md
              echo 'EOF'
            }
          } >> "$GITHUB_OUTPUT"
          cat /tmp/cov.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: unit-coverage
          message: ${{ steps.cov.outputs.body }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

  integration:
    name: Integration tests (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run integration tests
        run: go test -tags=integration -timeout=600s -count=1 ./tests/...
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
